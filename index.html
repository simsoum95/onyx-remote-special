<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <title>ONYX REMOTE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-fx"><div class="bg-grid"></div><div class="bg-orb orb1"></div><div class="bg-orb orb2"></div></div>

    <div id="loader">
        <div class="loader-rings"><div class="l-ring l1"></div><div class="l-ring l2"></div><div class="l-ring l3"></div></div>
        <div class="loader-text">ONYX</div>
        <div class="loader-sub">מתחבר לקולנוע...</div>
    </div>

    <div id="app" class="hidden">
        <header id="header">
            <div class="hdr-inner">
                <div class="hdr-brand">
                    <div class="hdr-title">ONYX</div>
                    <div class="hdr-status"><span class="hdr-dot" id="hdrDot"></span><span id="hdrLabel">מתחבר...</span></div>
                </div>
                <button class="hdr-btn" id="btnRefresh" title="רענן">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
                </button>
            </div>
        </header>

        <!-- PC: status bar visible, mobile: hidden -->
        <div class="status-bar pc-only" id="statusBar">
            <div class="stat-item" id="statProjector"><span class="stat-dot"></span><span class="stat-icon">📽️</span><span class="stat-label">מקרן</span><span class="stat-val">—</span></div>
            <div class="stat-item" id="statReceiver"><span class="stat-dot"></span><span class="stat-icon">🔊</span><span class="stat-label">מגבר</span><span class="stat-val">—</span></div>
            <div class="stat-item" id="statCurtain"><span class="stat-dot"></span><span class="stat-icon">🎭</span><span class="stat-label">וילון</span><span class="stat-val">—</span></div>
            <div class="stat-item" id="statLights"><span class="stat-dot"></span><span class="stat-icon">💡</span><span class="stat-label">תאורה</span><span class="stat-val">—</span></div>
            <div class="stat-item" id="statAdb"><span class="stat-dot"></span><span class="stat-icon">🔌</span><span class="stat-label">ADB</span><span class="stat-val">—</span></div>
        </div>

        <main id="mainContent">
            <!-- ==================== TAB 1: APPS ==================== -->
            <section class="tab-section" data-tab="apps">
                <div class="top-bar">
                    <button class="power-mini" id="btnPower">
                        <span class="power-mini-icon">⏻</span>
                        <span class="power-mini-label" id="powerState">כבוי</span>
                    </button>
                    <div class="vol-compact">
                        <button class="vol-btn-sm" id="vDown"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg></button>
                        <div class="vol-wrap-sm">
                            <div class="vol-bar"><div class="vol-fill" id="volFill"></div><div class="vol-knob" id="volKnob"></div></div>
                            <input type="range" class="vol-range" id="volRange" min="0" max="100" value="30">
                        </div>
                        <button class="vol-btn-sm" id="vUp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
                        <button class="vol-btn-sm vol-mute" id="vMute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
                    </div>
                </div>
                <div class="apps-grid" id="appsGrid"></div>
            </section>

            <!-- ==================== TAB 3: REMOTE ==================== -->
            <section class="tab-section" data-tab="remote">
                <div class="dpad">
                    <button class="dp dp-up" data-cmd="DPAD_UP">▲</button>
                    <button class="dp dp-left" data-cmd="DPAD_LEFT">◀</button>
                    <button class="dp dp-ok" data-cmd="DPAD_CENTER">OK</button>
                    <button class="dp dp-right" data-cmd="DPAD_RIGHT">▶</button>
                    <button class="dp dp-down" data-cmd="DPAD_DOWN">▼</button>
                </div>
                <div class="rmt-nav">
                    <button class="rmt-btn" data-cmd="BACK">↩ חזור</button>
                    <button class="rmt-btn" data-cmd="HOME">🏠 בית</button>
                    <button class="rmt-btn" data-cmd="MENU">☰ תפריט</button>
                </div>
                <div class="rmt-media">
                    <button class="rmt-m" data-cmd="MEDIA_REWIND">⏪</button>
                    <button class="rmt-m rmt-play" data-cmd="MEDIA_PLAY_PAUSE">⏯</button>
                    <button class="rmt-m" data-cmd="MEDIA_FAST_FORWARD">⏩</button>
                </div>
            </section>

            <!-- ==================== TAB 4: ROOM ==================== -->
            <section class="tab-section" data-tab="room">
                <div class="room-group">
                    <div class="room-hdr">
                        <span>💡 תאורה</span>
                        <div class="room-acts">
                            <button class="room-act" id="btnLOn">הכל ✓</button>
                            <button class="room-act room-act-off" id="btnLOff">הכל ✗</button>
                        </div>
                    </div>
                    <div id="lightsGrid" class="toggles-list"></div>
                </div>
                <div class="room-group">
                    <div class="room-hdr"><span>🎭 וילון</span><span class="badge" id="curtainBadge">—</span></div>
                    <div class="curtain-btns">
                        <button class="cur-btn" id="cOpen">פתיחה</button>
                        <button class="cur-btn" id="cClose">סגירה</button>
                    </div>
                </div>
                <div class="room-group">
                    <div class="room-hdr"><span>🔈 רמקולים</span></div>
                    <div id="speakersGrid" class="toggles-list"></div>
                </div>
            </section>

            <!-- PC-only extras (projector panel, curtain visual, keyboard) -->
            <div class="pc-only pc-extras">
                <div class="glass-card" id="projectorCard">
                    <div class="card-hdr"><span class="card-ico">📽️</span><span>מכשירים</span></div>
                    <div id="projectorPanel"></div>
                </div>
            </div>
        </main>

        <nav id="mNav">
            <button class="mn active" data-go="apps"><span class="mn-i">📺</span><span>קולנוע</span></button>
            <button class="mn" data-go="remote"><span class="mn-i">🕹️</span><span>שלט</span></button>
            <button class="mn" data-go="room"><span class="mn-i">🏠</span><span>חדר</span></button>
        </nav>

        <div id="toasts"></div>
    </div>

    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
