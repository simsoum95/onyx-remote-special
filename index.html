<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <title>ONYX REMOTE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-fx"><div class="bg-grid"></div><div class="bg-orb orb1"></div><div class="bg-orb orb2"></div><div class="bg-orb orb3"></div></div>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-rings"><div class="l-ring l1"></div><div class="l-ring l2"></div><div class="l-ring l3"></div></div>
        <div class="loader-text">ONYX</div>
        <div class="loader-sub">מתחבר לקולנוע...</div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header id="header">
            <div class="hdr-line"></div>
            <div class="hdr-inner">
                <div class="hdr-brand">
                    <div class="hdr-icon"><div class="hdr-ring-spin"></div>🎬</div>
                    <div>
                        <div class="hdr-title">ONYX REMOTE</div>
                        <div class="hdr-status"><span class="hdr-dot" id="hdrDot"></span><span id="hdrLabel">מתחבר...</span></div>
                    </div>
                </div>
                <div class="hdr-actions">
                    <button class="hdr-btn" id="btnRefresh" title="רענן">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- STATUS BAR — Vue rapide de tout le système -->
        <div class="status-bar" id="statusBar">
            <div class="stat-item" id="statProjector">
                <span class="stat-dot"></span>
                <span class="stat-icon">📽️</span>
                <span class="stat-label">מקרן</span>
                <span class="stat-val">—</span>
            </div>
            <div class="stat-item" id="statReceiver">
                <span class="stat-dot"></span>
                <span class="stat-icon">🔊</span>
                <span class="stat-label">מגבר</span>
                <span class="stat-val">—</span>
            </div>
            <div class="stat-item" id="statCurtain">
                <span class="stat-dot"></span>
                <span class="stat-icon">🎭</span>
                <span class="stat-label">וילון</span>
                <span class="stat-val">—</span>
            </div>
            <div class="stat-item" id="statLights">
                <span class="stat-dot"></span>
                <span class="stat-icon">💡</span>
                <span class="stat-label">תאורה</span>
                <span class="stat-val">—</span>
            </div>
        </div>

        <!-- Main content -->
        <main id="mainPC" class="main-pc">
            <div class="pc-col pc-right">
                <!-- HERO Cinema Mode -->
                <div class="glass-card pc-hero" id="pcHero">
                    <div class="hero-aura"></div>
                    <div class="hero-core">
                        <div class="hero-orbit" id="heroOrbit">
                            <div class="hero-center" id="heroCenter">▶</div>
                        </div>
                        <div class="hero-title">מצב קולנוע</div>
                        <div class="hero-sub" id="heroSub">⚫ קולנוע כבוי</div>
                        <!-- Panneau projecteur + receiver dédié -->
                        <div class="projector-panel" id="projectorPanel"></div>
                        <button class="hero-power" id="btnPower">
                            <span class="power-glow"></span>
                            <span id="powerLabel">הפעלה</span>
                        </button>
                    </div>
                    <div class="hero-chips">
                        <button class="chip" data-scene="ambient"><span class="chip-c" style="background:#6c5ce7"></span>אווירה</button>
                        <button class="chip" data-scene="pause"><span class="chip-c" style="background:#00cec9"></span>הפסקה</button>
                        <button class="chip chip-off" data-scene="cinema_off"><span class="chip-c" style="background:#ff4757"></span>כיבוי</button>
                    </div>
                </div>
                <!-- Curtain -->
                <div class="glass-card" id="pcCurtain">
                    <div class="card-hdr"><span class="card-ico">🎭</span><span>וילון</span><span class="badge" id="curtainBadge">—</span></div>
                    <div class="curtain-box">
                        <div class="cur-vis" id="curVis">
                            <div class="cur-fab cur-l"></div>
                            <div class="cur-fab cur-r"></div>
                            <div class="cur-screen"><div class="cur-glow"></div></div>
                        </div>
                        <div class="cur-btns">
                            <button class="cbtn" id="cOpen"><span>⟷</span>פתיחה</button>
                            <button class="cbtn" id="cStop"><span>⏹</span>עצור</button>
                            <button class="cbtn" id="cClose"><span>⟷</span>סגירה</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pc-col pc-left">
                <!-- Lights -->
                <div class="glass-card">
                    <div class="card-hdr">
                        <div><span class="card-ico">💡</span><span>תאורה</span><span class="lights-count" id="lightsCount"></span></div>
                        <div class="card-acts">
                            <button class="act-chip" id="btnLOn">הכל דלוק</button>
                            <button class="act-chip act-off" id="btnLOff">הכל כבוי</button>
                        </div>
                    </div>
                    <div class="lights-grid" id="lightsGrid"></div>
                </div>
                <!-- Sources — Apps Shield directes -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">🎯</span><span>אפליקציות</span><span class="activity-badge" id="currentActivity">—</span></div>
                    <div class="sources-grid" id="sourcesGrid"></div>
                </div>
                <!-- Chaînes TV -->
                <div class="glass-card" id="channelsSection">
                    <div class="card-hdr"><span class="card-ico">📺</span><span>ערוצים</span></div>
                    <div class="numpad">
                        <button class="numpad-btn" data-digit="1">1</button>
                        <button class="numpad-btn" data-digit="2">2</button>
                        <button class="numpad-btn" data-digit="3">3</button>
                        <button class="numpad-btn" data-digit="4">4</button>
                        <button class="numpad-btn" data-digit="5">5</button>
                        <button class="numpad-btn" data-digit="6">6</button>
                        <button class="numpad-btn" data-digit="7">7</button>
                        <button class="numpad-btn" data-digit="8">8</button>
                        <button class="numpad-btn" data-digit="9">9</button>
                        <button class="numpad-btn numpad-back" data-cmd="BACK">↩</button>
                        <button class="numpad-btn" data-digit="0">0</button>
                        <button class="numpad-btn numpad-ok" data-cmd="DPAD_CENTER">OK</button>
                    </div>
                    <div class="channels-grid" id="channelsGrid"></div>
                </div>
                <!-- Audio -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">🔊</span><span>שמע</span><span class="vol-num" id="volNum">—</span></div>
                    <div class="audio-row">
                        <button class="vol-btn" id="vDown"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg></button>
                        <div class="vol-wrap">
                            <div class="vol-bar"><div class="vol-fill" id="volFill"></div><div class="vol-knob" id="volKnob"></div></div>
                            <input type="range" class="vol-range" id="volRange" min="0" max="100" value="30">
                        </div>
                        <button class="vol-btn" id="vUp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
                        <button class="vol-btn vol-mute" id="vMute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
                    </div>
                </div>
                <!-- REMOTE — Télécommande intelligente -->
                <div class="glass-card" id="remoteCard">
                    <div class="card-hdr"><span class="card-ico">🕹️</span><span>שלט רחוק</span></div>
                    <!-- D-pad -->
                    <div class="dpad">
                        <button class="dp dp-up" data-cmd="DPAD_UP">▲</button>
                        <button class="dp dp-left" data-cmd="DPAD_LEFT">◀</button>
                        <button class="dp dp-ok" data-cmd="DPAD_CENTER">OK</button>
                        <button class="dp dp-right" data-cmd="DPAD_RIGHT">▶</button>
                        <button class="dp dp-down" data-cmd="DPAD_DOWN">▼</button>
                    </div>
                    <!-- Nav buttons -->
                    <div class="rmt-nav">
                        <button class="rmt-btn" data-cmd="BACK">↩ חזור</button>
                        <button class="rmt-btn" data-cmd="HOME">🏠 בית</button>
                        <button class="rmt-btn" data-cmd="MENU">☰ תפריט</button>
                    </div>
                    <!-- Media controls -->
                    <div class="rmt-media">
                        <button class="rmt-m" data-cmd="MEDIA_REWIND">⏪</button>
                        <button class="rmt-m rmt-play" data-cmd="MEDIA_PLAY_PAUSE">⏯</button>
                        <button class="rmt-m" data-cmd="MEDIA_FAST_FORWARD">⏩</button>
                        <button class="rmt-m" data-cmd="MEDIA_PREVIOUS">⏮</button>
                        <button class="rmt-m" data-cmd="MEDIA_STOP">⏹</button>
                        <button class="rmt-m" data-cmd="MEDIA_NEXT">⏭</button>
                    </div>
                    <!-- Keyboard toggle -->
                    <div class="rmt-kb-wrap">
                        <button class="rmt-btn rmt-kb-toggle" id="kbToggle">⌨️ מקלדת</button>
                        <div class="rmt-kb hidden" id="kbPanel">
                            <input type="text" class="rmt-input" id="kbInput" placeholder="הקלד לחיפוש..." dir="ltr">
                            <button class="rmt-btn rmt-send" id="kbSend">שלח</button>
                        </div>
                    </div>
                </div>
                <!-- Speakers -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">🔈</span><span>רמקולים</span></div>
                    <div class="speakers-grid" id="speakersGrid"></div>
                </div>
                <!-- Devices -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">⚡</span><span>מכשירים</span></div>
                    <div class="devices-grid" id="devicesGrid"></div>
                </div>
            </div>
        </main>

        <!-- Mobile nav -->
        <nav id="mNav">
            <button class="mn active" data-go="hero"><span class="mn-i">🎬</span><span>קולנוע</span></button>
            <button class="mn" data-go="sources"><span class="mn-i">📡</span><span>אפליקציות</span></button>
            <button class="mn" data-go="channels"><span class="mn-i">📺</span><span>ערוצים</span></button>
            <button class="mn" data-go="remote"><span class="mn-i">🕹️</span><span>שלט</span></button>
            <button class="mn" data-go="audio"><span class="mn-i">🔊</span><span>שמע</span></button>
        </nav>

        <div id="toasts"></div>
    </div>

    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
