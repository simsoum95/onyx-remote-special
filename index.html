<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">
    <meta name="description" content="Onyx Remote — שלט קולנוע ביתי חכם">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <title>ONYX REMOTE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fond animé -->
    <div class="bg-fx">
        <div class="bg-grid"></div>
        <div class="bg-orb orb1"></div>
        <div class="bg-orb orb2"></div>
        <div class="bg-orb orb3"></div>
    </div>

    <!-- ==================== SETUP (premier lancement) ==================== -->
    <div id="setup" class="hidden">
        <div class="setup-card">
            <div class="setup-rings">
                <div class="s-ring s-ring1"></div>
                <div class="s-ring s-ring2"></div>
            </div>
            <div class="setup-logo">ONYX</div>
            <div class="setup-sub">שלט קולנוע חכם</div>
            <div class="setup-form">
                <label class="setup-label">כתובת Home Assistant</label>
                <input class="setup-input" id="inputUrl" type="url" placeholder="https://xxxxx.ui.nabu.casa" autocomplete="url">
                <label class="setup-label">טוקן גישה (Long-Lived Token)</label>
                <input class="setup-input" id="inputToken" type="password" placeholder="eyJhbGciOi..." autocomplete="off">
                <button class="setup-btn" id="btnSetupConnect">
                    <span class="setup-btn-glow"></span>
                    <span>התחבר</span>
                </button>
                <div class="setup-error hidden" id="setupError"></div>
            </div>
        </div>
    </div>

    <!-- ==================== LOADER ==================== -->
    <div id="loader" class="hidden">
        <div class="loader-rings">
            <div class="l-ring l1"></div>
            <div class="l-ring l2"></div>
            <div class="l-ring l3"></div>
        </div>
        <div class="loader-text">ONYX</div>
        <div class="loader-sub">מתחבר לקולנוע...</div>
    </div>

    <!-- ==================== APP ==================== -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header id="header">
            <div class="hdr-line"></div>
            <div class="hdr-inner">
                <div class="hdr-brand">
                    <div class="hdr-icon"><div class="hdr-ring-spin"></div>🎬</div>
                    <div>
                        <div class="hdr-title">ONYX REMOTE</div>
                        <div class="hdr-status"><span class="hdr-dot" id="hdrDot"></span><span id="hdrLabel">מתחבר...</span></div>
                    </div>
                </div>
                <div class="hdr-actions">
                    <button class="hdr-btn" id="btnRefresh" title="רענן">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
                    </button>
                    <button class="hdr-btn" id="btnSettings" title="הגדרות">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- ============ PC LAYOUT (>1024px) ============ -->
        <main id="mainPC" class="main-pc">
            <div class="pc-col pc-right">
                <!-- Cinema Mode -->
                <div class="glass-card pc-hero" id="pcHero">
                    <div class="hero-aura"></div>
                    <div class="hero-core">
                        <div class="hero-orbit" id="heroOrbit">
                            <div class="hero-center" id="heroCenter">▶</div>
                        </div>
                        <div class="hero-title">מצב קולנוע</div>
                        <div class="hero-sub" id="heroSub">מוכן</div>
                        <button class="hero-power" id="btnPower">
                            <span class="power-glow"></span>
                            <span id="powerLabel">הפעלה</span>
                        </button>
                    </div>
                    <div class="hero-chips">
                        <button class="chip" data-scene="ambient"><span class="chip-c" style="background:#6c5ce7"></span>אווירה</button>
                        <button class="chip" data-scene="pause"><span class="chip-c" style="background:#00cec9"></span>הפסקה</button>
                        <button class="chip chip-off" data-scene="cinema_off"><span class="chip-c" style="background:#ff4757"></span>כיבוי</button>
                    </div>
                </div>
                <!-- Curtain -->
                <div class="glass-card" id="pcCurtain">
                    <div class="card-hdr"><span class="card-ico">🎭</span><span>וילון</span><span class="badge" id="curtainBadge">—</span></div>
                    <div class="curtain-box">
                        <div class="cur-vis" id="curVis">
                            <div class="cur-fab cur-l"></div>
                            <div class="cur-fab cur-r"></div>
                            <div class="cur-screen"><div class="cur-glow"></div></div>
                        </div>
                        <div class="cur-btns">
                            <button class="cbtn" id="cOpen"><span>⟷</span>פתיחה</button>
                            <button class="cbtn" id="cStop"><span>⏹</span>עצור</button>
                            <button class="cbtn" id="cClose"><span>⟷</span>סגירה</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="pc-col pc-left">
                <!-- Lights -->
                <div class="glass-card">
                    <div class="card-hdr">
                        <div><span class="card-ico">💡</span><span>תאורה</span></div>
                        <div class="card-acts">
                            <button class="act-chip" id="btnLOn">הכל דלוק</button>
                            <button class="act-chip act-off" id="btnLOff">הכל כבוי</button>
                        </div>
                    </div>
                    <div class="lights-grid" id="lightsGrid"></div>
                </div>
                <!-- Sources -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">📡</span><span>מקורות</span></div>
                    <div class="sources-grid" id="sourcesGrid"></div>
                </div>
                <!-- Audio -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">🔊</span><span>שמע</span><span class="vol-num" id="volNum">—</span></div>
                    <div class="audio-row">
                        <button class="vol-btn" id="vDown"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg></button>
                        <div class="vol-wrap">
                            <div class="vol-bar"><div class="vol-fill" id="volFill"></div><div class="vol-knob" id="volKnob"></div></div>
                            <input type="range" class="vol-range" id="volRange" min="0" max="100" value="30">
                        </div>
                        <button class="vol-btn" id="vUp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
                        <button class="vol-btn vol-mute" id="vMute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
                    </div>
                </div>
                <!-- Devices -->
                <div class="glass-card">
                    <div class="card-hdr"><span class="card-ico">⚡</span><span>מכשירים</span></div>
                    <div class="devices-grid" id="devicesGrid"></div>
                </div>
            </div>
        </main>

        <!-- Mobile nav -->
        <nav id="mNav">
            <button class="mn active" data-go="hero"><span class="mn-i">🎬</span><span>קולנוע</span></button>
            <button class="mn" data-go="lights"><span class="mn-i">💡</span><span>תאורה</span></button>
            <button class="mn" data-go="sources"><span class="mn-i">📡</span><span>מקורות</span></button>
            <button class="mn" data-go="audio"><span class="mn-i">🔊</span><span>שמע</span></button>
        </nav>

        <!-- Toasts -->
        <div id="toasts"></div>
    </div>

    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
